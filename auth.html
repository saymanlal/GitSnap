<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up / Sign In - GitSnap</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
    <div class="nav-container">

        <a href="index.html" class="logo">
            <span class="logo-icon">📸</span>
            <span class="logo-text">GitSnap</span>
        </a>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html#features">Features</a>
            <a href="index.html#pricing">Pricing</a>
        </div>

    </div>
</nav>

<div class="auth-container">

    <div class="auth-tabs">
        <button class="tab-btn active" data-tab="signup">✨ Sign Up</button>
        <button class="tab-btn" data-tab="signin">🔑 Sign In</button>
    </div>

    <!-- SIGN UP -->
    <div id="signup-tab" class="auth-form active">

        <h2>Create Your Account</h2>
        <p class="auth-subtitle">
            No password needed. A secret key file will be downloaded.
        </p>

        <form id="signupForm">

            <div class="form-group">
                <label>First Name</label>
                <input
                    type="text"
                    id="firstName"
                    placeholder="John"
                    required
                >
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input
                    type="text"
                    id="lastName"
                    placeholder="Doe"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Sign Up →
            </button>

        </form>

        <div class="auth-note">
            <small>
                ⚠️ Save your downloaded key file safely.
                You need it to sign in.
            </small>
        </div>

    </div>

    <!-- SIGN IN -->
    <div id="signin-tab" class="auth-form">

        <h2>Sign In</h2>
        <p class="auth-subtitle">
            Upload your secret key file to login.
        </p>

        <form id="signinForm">

            <div class="form-group">
                <label>Full Name</label>
                <input
                    type="text"
                    id="signinUsername"
                    placeholder="John Doe"
                    required
                >
            </div>

            <div class="form-group">
                <label>Secret Key File</label>
                <input
                    type="file"
                    id="secretKeyFile"
                    accept=".key"
                    required
                >
                <small>
                    Upload the file downloaded during sign up
                </small>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Sign In →
            </button>

        </form>

    </div>

</div>

<script src="auth.js"></script>

</body>
</html>
