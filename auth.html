<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up / Sign In - GitSnap</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">📸</span>
                <span class="logo-text">GitSnap</span>
            </a>
            <div class="nav-links">
                <a href="index.html#features">Features</a>
                <a href="index.html#pricing">Pricing</a>
                <a href="index.html">Home</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="signup">✨ Sign Up</button>
            <button class="tab-btn" data-tab="signin">🔑 Sign In</button>
        </div>

        <!-- Sign Up Form -->
        <div id="signup-tab" class="auth-form active">
            <h2>Create Your Account</h2>
            <p class="auth-subtitle">No password needed. You'll get a secret key file.</p>
            
            <form id="signupForm">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" required placeholder="John">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" required placeholder="Doe">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign Up →</button>
            </form>
            <div class="auth-note">
                <small>⚠️ Your secret key file will be downloaded automatically. Store it safely!</small>
            </div>
        </div>

        <!-- Sign In Form -->
        <div id="signin-tab" class="auth-form">
            <h2>Sign In</h2>
            <p class="auth-subtitle">Upload your secret key file</p>
            
            <form id="signinForm">
                <div class="form-group">
                    <label>Username (Full Name)</label>
                    <input type="text" id="signinUsername" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Secret Key File</label>
                    <input type="file" id="secretKeyFile" accept=".key" required>
                    <small>Upload the .key file you downloaded during sign up</small>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign In →</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="auth.js"></script>
</body>
</html>
